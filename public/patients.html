<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Patient Directory</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/patients.css">
  </head>

  <body class="dashboard-page">
    <div class="layout">
      <aside class="sidebar">
        <div class="logo">
            <img src="images/logo.png" alt="HealthSys Logo">
            <div>
                <h2>HealthSys Admin</h2>
                <p>General Hospital</p>
            </div>
        </div>
        <nav>
        <ul class="menu">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li class="active"><a href="patients.html">Patients</a></li>
            <li><a href="appointments.html">Appointments</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
        </nav>
        <div class="user-profile">
            <img src="images/avatar.png" alt="User avatar">
            <div>
                <strong>Dr. Alexander Smith</strong>
                <p>Cardiologist</p>
            </div>
        </div>
      </aside>

      <div class="main">
        <div class="page-header">
          <h1>Patient Directory</h1>

          <div class="header-actions">
            <input
              type="text"
              placeholder="Global search..."
              class="global-search"
            />

            <button class="add-btn" id="addPatientBtn">+ Add New Patient</button>
          </div>
        </div>

        <div class="records-header">
          <div>
            <h2>Active Patient Records</h2>
            <p id="patientRecordSummary">Managing live patient records.</p>
          </div>

          <div class="records-actions">
            <button class="filter-btn">Filter</button>
            <button class="export-btn">Export CSV</button>
          </div>
        </div>

        <div class="search-box">
          <input
            id="patientSearch"
            type="text"
            placeholder="Search by name, ID, or medical record number..."
          />
        </div>

        <table class="patient-table">
          <thead>
            <tr>
              <th>Patient ID</th>
              <th>Full Name</th>
              <th>Age</th>
              <th>Gender</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="patientTable"></tbody>
        </table>

        <div class="pagination">
          <button>Previous</button>
          <button class="active">1</button>
          <button>Next</button>
        </div>
      </div>
    </div>

    <script src="js/patients.js"></script>
  </body>
</html>
