<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Settings | HealthSys</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/settings.css">
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="logo">
          <img src="images/logo.png" alt="HealthSys Logo">
          <div>
            <h2>HealthSys Admin</h2>
            <p>General Hospital</p>
          </div>
        </div>
        <nav>
          <ul class="menu">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="patients.html">Patients</a></li>
            <li><a href="appointments.html">Appointments</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li class="active"><a href="settings.html">Settings</a></li>
          </ul>
        </nav>
        <div class="user-profile">
          <img src="images/avatar.png" alt="User avatar">
          <div>
            <strong>Dr. Alexander Smith</strong>
            <p>Cardiologist</p>
          </div>
        </div>
      </aside>

      <main class="main">
        <div class="topbar">
          <input class="search" placeholder="Search settings...">
          <div class="top-icons">
            <span>Alerts</span>
            <span>Help</span>
          </div>
        </div>

        <div class="welcome">
          <h1>System Settings</h1>
          <p>Manage hospital configuration and account preferences.</p>
        </div>

        <div class="panels settings-grid">
          <div class="panel">
            <div class="panel-header">
              <h3>Hospital Information</h3>
            </div>
            <form class="settings-form" id="hospitalInfoForm">
              <label>Hospital Name</label>
              <input type="text" id="hospitalName" value="General Hospital">
              <label>Address</label>
              <input type="text" id="hospitalAddress" placeholder="Enter hospital address">
              <label>Contact Email</label>
              <input type="email" id="hospitalEmail" placeholder="hospital@email.com">
              <label>Phone</label>
              <input type="text" id="hospitalPhone" placeholder="+1 555 222 333">
              <button class="btn-primary" type="submit">Save Changes</button>
            </form>
          </div>

          <div class="panel">
            <div class="panel-header">
              <h3>User Profile</h3>
            </div>
            <form class="settings-form" id="userProfileForm">
              <label>Full Name</label>
              <input type="text" id="profileFullName" value="Dr. Alexander Smith">
              <label>Specialization</label>
              <input type="text" id="profileSpecialization" value="Cardiologist">
              <label>Email</label>
              <input type="email" id="profileEmail" placeholder="doctor@email.com">
              <label>Phone</label>
              <input type="text" id="profilePhone">
              <button class="btn-primary" type="submit">Update Profile</button>
            </form>
          </div>

          <div class="panel">
            <div class="panel-header">
              <h3>System Preferences</h3>
            </div>
            <form class="settings-form" id="preferencesForm">
              <label>Default Language</label>
              <select id="preferenceLanguage">
                <option value="English">English</option>
                <option value="Spanish">Spanish</option>
                <option value="French">French</option>
              </select>
              <label>Timezone</label>
              <select id="preferenceTimezone">
                <option value="UTC">UTC</option>
                <option value="UTC +1">UTC +1</option>
                <option value="UTC +7">UTC +7</option>
              </select>
              <label>Enable Notifications</label>
              <select id="preferenceNotifications">
                <option value="Enabled">Enabled</option>
                <option value="Disabled">Disabled</option>
              </select>
              <button class="btn-primary" type="submit">Save Preferences</button>
            </form>
          </div>

          <div class="panel">
            <div class="panel-header">
              <h3>Change Password</h3>
            </div>
            <form class="settings-form" id="passwordForm">
              <label>Current Password</label>
              <input type="password" id="currentPassword">
              <label>New Password</label>
              <input type="password" id="newPassword">
              <label>Confirm Password</label>
              <input type="password" id="confirmPassword">
              <button class="btn-primary" type="submit">Update Password</button>
            </form>
          </div>
        </div>
        <p id="settingsMessage"></p>
      </main>
    </div>
    <script src="js/settings.js"></script>
  </body>
</html>
